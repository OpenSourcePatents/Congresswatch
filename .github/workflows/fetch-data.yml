name: Fetch Congress Data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run fetcher
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python fetch.py
      - name: Save data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update data"
          git push
