name: Fetch Member Votes.V1

on:
  schedule:
    - cron: '0 1 * * *' # Daily at 1:00 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Vote Fetcher
        env:
          PROPUBLICA_API_KEY: ${{ secrets.PROPUBLICA_API_KEY }}
        run: python fetch_votes.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "CongressWatch-Bot"
          git config --global user.email "bot@congresswatch.org"
          git add data/details/
          git commit -m "Update member vote details [Automated]" || echo "No changes to commit"
          git push
