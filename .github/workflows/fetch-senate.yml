name: Fetch Senate
on:
workflow_dispatch:
schedule:
- cron: ‘0 2 * * *’
jobs:
fetch:
runs-on: ubuntu-latest
permissions:
contents: write
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
      with:
        python-version: ‘3.11’
- run: pip install requests
- name: Fetch Senate members
env:
CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
run: |
cat > /tmp/senate.py << ‘PYEOF’
import os,json,time,requests
from datetime import datetime
KEY=os.environ.get(“CONGRESS_API_KEY”,””)
BASE=“https://api.congress.gov/v3”
H={“User-Agent”:“CongressWatch”}
CHAMBER=“Senate”
def photo(b):
if not b: return “”
return “https://bioguide.congress.gov/bioguide/photo/”+b[0].upper()+”/”+b+”.jpg”
def party(p):
p=(p or “”).lower()
if “democrat” in p: return “Democratic”
if “republican” in p: return “Republican”
if “independent” in p: return “Independent”
return “Unknown”
def fixname(r):
if “,” in r:
p=r.split(”,”,1)
return p[1].strip()+” “+p[0].strip()
return r
def termstart(m):
t=m.get(“terms”,{})
if isinstance(t,dict):
items=t.get(“item”,[])
if items:
y=items[0].get(“startYear”,””) or items[0].get(“start”,””)
if y: return str(y)+”-01-01” if len(str(y))==4 else str(y)
return “2010-01-01”
def fetch():
p={“api_key”:KEY,“limit”:250,“currentMember”:“true”,“chamber”:CHAMBER,“offset”:0}
results=[]
while True:
time.sleep(0.5)
res=requests.get(BASE+”/member”,params=p,headers=H,timeout=30)
batch=res.json().get(“members”,[])
if not batch: break
results.extend(batch)
print(CHAMBER+”: “+str(len(results)))
if len(batch)<250: break
p[“offset”]+=250
return results
raw=fetch()
members=[]
seen=set()
for m in raw:
b=m.get(“bioguideId”,””)
if not b or b in seen: continue
seen.add(b)
members.append({
“id”:b,
“name”:fixname(m.get(“name”,””)),
“party”:party(m.get(“partyName”,””)),
“state”:m.get(“state”,””),
“district”:””,
“chamber”:CHAMBER,
“photo_url”:photo(b),
“term_start”:termstart(m),
“score”:0,
“flags”:[],
“updated”:datetime.now().isoformat()
})
os.makedirs(“data”,exist_ok=True)
json.dump(members,open(“data/senate.json”,“w”),indent=2)
print(“Saved “+str(len(members))+” senators”)
PYEOF
python3 /tmp/senate.py
- name: Commit senate data
run: |
git config –global user.name “bot”
git config –global user.email “bot@bot.com”
git add data/senate.json
git diff –staged –quiet || git commit -m “Update senate.json”
git pull –rebase
git push
