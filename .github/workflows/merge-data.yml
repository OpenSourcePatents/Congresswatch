name: Merge Data
on:
workflow_dispatch:
workflow_run:
workflows: [“Fetch Senate”, “Fetch House”]
types:
- completed
jobs:
merge:
runs-on: ubuntu-latest
permissions:
contents: write
steps:
- uses: actions/checkout@v4
with:
ref: main
- uses: actions/setup-python@v5
with:
python-version: ‘3.11’
- name: Merge senate and house into members.json
run: |
cat > /tmp/merge.py << ‘PYEOF’
import json,os
senate=[]
house=[]
if os.path.exists(“data/senate.json”):
senate=json.load(open(“data/senate.json”))
print(“Senate loaded: “+str(len(senate)))
else:
print(“WARNING: data/senate.json not found”)
if os.path.exists(“data/house.json”):
house=json.load(open(“data/house.json”))
print(“House loaded: “+str(len(house)))
else:
print(“WARNING: data/house.json not found”)
seen={}
for m in senate:
b=m.get(“id”,””)
if b: seen[b]=m
for m in house:
b=m.get(“id”,””)
if b and b not in seen: seen[b]=m
members=list(seen.values())
s=sum(1 for m in members if m.get(“chamber”)==“Senate”)
h=sum(1 for m in members if m.get(“chamber”)==“House”)
print(“Senate: “+str(s)+” House: “+str(h)+” Total: “+str(len(members)))
json.dump(members,open(“data/members.json”,“w”),indent=2)
print(“Saved members.json”)
PYEOF
python3 /tmp/merge.py
- name: Commit merged data
run: |
git config –global user.name “bot”
git config –global user.email “bot@bot.com”
git add data/members.json
git diff –staged –quiet || git commit -m “Merge members.json (senate+house)”
git pull –rebase
git push
