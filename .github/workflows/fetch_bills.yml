name: Fetch Bill Similarity Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests scikit-learn numpy

      - name: Run bill similarity engine
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python fetch_bills.py

      - name: Save data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add data/details/ data/bills/
          git diff --staged --quiet || git commit -m "Update bill similarity data"
          git pull --rebase origin main
          git push