<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CongressWatch — Follow The Money</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #666666;
    --accent: #ff2d55;
    --blue: #0a84ff;
    --green: #30d158;
    --orange: #ff9f0a;
    --yellow: #ffd60a;
    --dem: #3b82f6;
    --rep: #ef4444;
    --ind: #a855f7;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
overflow-x: hidden;
}

/* ── HEADER ── */
header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
background: rgba(10,10,10,0.95);
backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
padding: 0 16px;
height: 52px;
display: flex;
align-items: center;
justify-content: space-between;
min-width: 100%;
}

.logo {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 16px;
color: var(–text);
white-space: nowrap;
flex-shrink: 0;
}

.logo span { color: var(–accent); }

nav {
display: flex;
gap: 20px;
align-items: center;
overflow-x: auto;
scrollbar-width: none;
-webkit-overflow-scrolling: touch;
padding-left: 16px;
}

nav::-webkit-scrollbar { display: none; }

nav a {
font-size: 10px;
font-weight: 500;
letter-spacing: 0.1em;
color: var(–muted);
text-decoration: none;
white-space: nowrap;
text-transform: uppercase;
transition: color 0.2s;
}

nav a:hover, nav a.active { color: var(–text); }

.live-badge {
display: flex;
align-items: center;
gap: 5px;
font-size: 9px;
color: var(–green);
letter-spacing: 0.1em;
white-space: nowrap;
flex-shrink: 0;
margin-left: 12px;
}

.live-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–green);
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.5; transform: scale(0.8); }
}

/* ── HERO ── */
.hero {
padding: 80px 16px 24px;
}

.hero h1 {
font-family: ‘Syne’, sans-serif;
font-size: clamp(28px, 7vw, 48px);
font-weight: 800;
line-height: 1.1;
margin-bottom: 10px;
}

.hero h1 em { color: var(–accent); font-style: normal; }

.hero p {
font-size: 11px;
color: var(–muted);
letter-spacing: 0.05em;
margin-bottom: 24px;
}

/* ── STATS BAR ── */
.stats {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 1px;
background: var(–border);
border: 1px solid var(–border);
margin-bottom: 24px;
}

.stat {
background: var(–surface);
padding: 14px 12px;
text-align: center;
}

.stat-num {
font-family: ‘Syne’, sans-serif;
font-size: clamp(18px, 5vw, 28px);
font-weight: 800;
color: var(–accent);
display: block;
line-height: 1;
margin-bottom: 4px;
}

.stat-label {
font-size: 8px;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
}

/* ── STICKY FILTERS ── */
.filters-wrapper {
position: sticky;
top: 52px;
z-index: 90;
background: var(–bg);
border-bottom: 1px solid var(–border);
padding: 10px 16px;
}

.search-box {
width: 100%;
background: var(–surface);
border: 1px solid var(–border);
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
padding: 10px 14px;
margin-bottom: 10px;
outline: none;
transition: border-color 0.2s;
}

.search-box:focus { border-color: var(–accent); }
.search-box::placeholder { color: var(–muted); }

.filter-row {
display: flex;
gap: 6px;
overflow-x: auto;
scrollbar-width: none;
padding-bottom: 2px;
margin-bottom: 6px;
}

.filter-row::-webkit-scrollbar { display: none; }

.filter-btn {
background: var(–surface);
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.08em;
padding: 6px 12px;
cursor: pointer;
white-space: nowrap;
text-transform: uppercase;
transition: all 0.15s;
flex-shrink: 0;
}

.filter-btn.active {
background: var(–text);
color: var(–bg);
border-color: var(–text);
}

.filter-btn.dem.active { background: var(–dem); border-color: var(–dem); color: #fff; }
.filter-btn.rep.active { background: var(–rep); border-color: var(–rep); color: #fff; }
.filter-btn.ind.active { background: var(–ind); border-color: var(–ind); color: #fff; }
.filter-btn.critical.active { background: var(–accent); border-color: var(–accent); color: #fff; }
.filter-btn.high.active { background: var(–orange); border-color: var(–orange); color: #000; }
.filter-btn.low.active { background: var(–green); border-color: var(–green); color: #000; }

.results-bar {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 6px;
}

.results-count {
font-size: 10px;
color: var(–muted);
}

.sort-select {
background: var(–surface);
border: 1px solid var(–border);
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
padding: 5px 8px;
outline: none;
cursor: pointer;
}

/* ── MEMBER GRID ── */
.grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 1px;
background: var(–border);
padding: 0 0 80px;
}

.card {
background: var(–surface);
cursor: pointer;
position: relative;
overflow: hidden;
transition: background 0.15s;
aspect-ratio: 3/4;
}

.card:hover { background: var(–surface2); }

.card-photo {
width: 100%;
height: 100%;
object-fit: cover;
object-position: top center;
display: block;
transition: transform 0.3s;
}

.card:hover .card-photo { transform: scale(1.03); }

.card-photo-placeholder {
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Syne’, sans-serif;
font-size: 36px;
font-weight: 800;
color: var(–muted);
background: var(–surface2);
}

.card-overlay {
position: absolute;
bottom: 0; left: 0; right: 0;
background: linear-gradient(transparent, rgba(0,0,0,0.92) 40%);
padding: 32px 10px 10px;
}

.card-score {
position: absolute;
top: 8px; right: 8px;
width: 40px; height: 40px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 14px;
color: #fff;
border: 2px solid rgba(255,255,255,0.3);
}

.party-bar {
position: absolute;
top: 0; left: 0;
width: 3px;
height: 100%;
}

.card-name {
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 13px;
line-height: 1.2;
margin-bottom: 3px;
color: #fff;
}

.card-meta {
font-size: 9px;
color: rgba(255,255,255,0.6);
letter-spacing: 0.05em;
}

.card-flags {
display: flex;
gap: 3px;
margin-top: 5px;
flex-wrap: wrap;
}

.flag-tag {
font-size: 7px;
letter-spacing: 0.08em;
padding: 2px 5px;
text-transform: uppercase;
font-weight: 500;
}

/* ── MODAL ── */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
z-index: 200;
background: rgba(0,0,0,0.88);
backdrop-filter: blur(6px);
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.modal-overlay.open { display: block; }

.modal {
background: #0d0d0d;
margin: 16px;
border: 1px solid #333;
position: relative;
min-height: 80vh;
color: #f0f0f0;
}

.modal-close {
position: fixed;
top: 24px; right: 24px;
z-index: 210;
background: #222;
border: 1px solid #444;
color: var(–text);
width: 36px; height: 36px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
font-size: 18px;
}

.modal-header {
padding: 20px;
border-bottom: 1px solid #222;
display: flex;
gap: 16px;
align-items: flex-start;
}

.modal-photo {
width: 72px; height: 90px;
object-fit: cover;
object-position: top;
flex-shrink: 0;
}

.modal-photo-placeholder {
width: 72px; height: 90px;
background: #1a1a1a;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Syne’, sans-serif;
font-size: 24px;
font-weight: 800;
color: #444;
flex-shrink: 0;
}

.modal-info { flex: 1; }

.modal-name {
font-family: ‘Syne’, sans-serif;
font-size: 20px;
font-weight: 800;
margin-bottom: 6px;
}

.modal-detail {
font-size: 10px;
color: #bbbbbb;
letter-spacing: 0.06em;
line-height: 1.8;
text-transform: uppercase;
}

.modal-score-big {
font-family: ‘Syne’, sans-serif;
font-size: 48px;
font-weight: 800;
line-height: 1;
margin-top: 4px;
}

.modal-score-label {
font-size: 8px;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
}

.modal-section {
padding: 16px 20px;
border-bottom: 1px solid #1a1a1a;
}

.modal-section-title {
font-size: 9px;
color: #888888;
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 12px;
}

.kv-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 8px 0;
border-bottom: 1px solid #1a1a1a;
font-size: 12px;
}

.kv-row:last-child { border-bottom: none; }
.kv-label { color: #aaaaaa; }
.kv-value { color: #f0f0f0; text-align: right; }
.kv-value.hot { color: var(–accent); }
.kv-value.warm { color: var(–orange); }
.kv-value.cool { color: var(–green); }

/* OPAQUE warning boxes */
.flag-box {
background: #1e1010;
border: 1px solid #3a1515;
border-left: 3px solid var(–accent);
padding: 12px 14px;
margin-bottom: 8px;
display: flex;
gap: 10px;
align-items: flex-start;
}

.flag-box.warn {
background: #1e1800;
border-color: #3a3000;
border-left-color: var(–orange);
}

.flag-box.info {
background: #0e1820;
border-color: #152030;
border-left-color: var(–blue);
}

.flag-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

.flag-text {
font-size: 11px;
line-height: 1.6;
color: #e0e0e0;
}

.modal-actions {
padding: 16px 20px;
display: flex;
gap: 10px;
}

.btn {
flex: 1;
padding: 12px;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.1em;
text-transform: uppercase;
cursor: pointer;
border: 1px solid var(–border);
background: var(–surface2);
color: var(–text);
transition: all 0.15s;
}

.btn:hover { background: var(–surface); border-color: #444; }
.btn.primary { background: var(–accent); border-color: var(–accent); color: #fff; }
.btn.primary:hover { background: #e0003a; }

/* ── LOADING ── */
.loading {
text-align: center;
padding: 80px 20px;
color: var(–muted);
font-size: 12px;
letter-spacing: 0.1em;
}

.loading-bar {
width: 200px;
height: 2px;
background: var(–border);
margin: 16px auto 0;
overflow: hidden;
}

.loading-fill {
height: 100%;
background: var(–accent);
animation: load 1.5s ease-in-out infinite;
}

@keyframes load {
0% { width: 0; margin-left: 0; }
50% { width: 100%; margin-left: 0; }
100% { width: 0; margin-left: 100%; }
}

.empty {
text-align: center;
padding: 60px 20px;
color: var(–muted);
font-size: 12px;
}

/* score colors */
.score-critical { background: var(–accent); }
.score-high     { background: var(–orange); }
.score-medium   { background: var(–yellow); color: #000; }
.score-low      { background: var(–green); }
.score-minimal  { background: #333; }
</style>

</head>
<body>

<header>
  <div class="logo">Congress<span>Watch</span></div>
  <nav>
    <a href="#" class="active">Members</a>
    <a href="#">Bills</a>
    <a href="#">Donors</a>
    <a href="#">Trades</a>
  </nav>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<div class="hero">
  <h1>535 Members.<br><em>Zero Accountability.</em></h1>
  <p>// All data from public records · FEC · SEC EDGAR · Congress.gov</p>

  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="stat-high">—</span>
      <span class="stat-label">High Anomaly</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-total">—</span>
      <span class="stat-label">Members</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-trades">—</span>
      <span class="stat-label">Stock Trades</span>
    </div>
  </div>
</div>

<div class="filters-wrapper">
  <input type="search" class="search-box" id="search" placeholder="Search name, state, district...">

  <div class="filter-row" id="chamber-filters">
    <button class="filter-btn active" data-chamber="all">All</button>
    <button class="filter-btn" data-chamber="Senate">Senate</button>
    <button class="filter-btn" data-chamber="House">House</button>
  </div>

  <div class="filter-row" id="party-filters">
    <button class="filter-btn active" data-party="all">All</button>
    <button class="filter-btn dem" data-party="Democratic">Dem</button>
    <button class="filter-btn rep" data-party="Republican">Rep</button>
    <button class="filter-btn ind" data-party="Independent">Ind</button>
  </div>

  <div class="results-bar">
    <span class="results-count" id="results-count">Loading...</span>
    <select class="sort-select" id="sort-select">
      <option value="score-desc">Highest Score</option>
      <option value="score-asc">Lowest Score</option>
      <option value="name-asc">Name A–Z</option>
      <option value="name-desc">Name Z–A</option>
      <option value="state-asc">State A–Z</option>
    </select>
  </div>
</div>

<div id="grid-container">
  <div class="loading">
    LOADING MEMBERS
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <button class="modal-close" onclick="closeModalDirect()">✕</button>
  <div class="modal" id="modal-content" onclick="event.stopPropagation()">
    <!-- filled by JS -->
  </div>
</div>

<script>
// ── STATE ──
let allMembers = [];
let filtered = [];
let activeFilters = { chamber: 'all', party: 'all', search: '', sort: 'score-desc' };

// ── HELPERS ──
function getPhotoUrl(id) {
  if (!id) return '';
  return `https://bioguide.congress.gov/bioguide/photo/${id[0].toUpperCase()}/${id}.jpg`;
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function getScoreClass(score) {
  if (score >= 80) return 'score-critical';
  if (score >= 60) return 'score-high';
  if (score >= 40) return 'score-medium';
  if (score >= 20) return 'score-low';
  return 'score-minimal';
}

function getScoreColor(score) {
  if (score >= 80) return '#ff2d55';
  if (score >= 60) return '#ff9f0a';
  if (score >= 40) return '#ffd60a';
  if (score >= 20) return '#30d158';
  return '#555';
}

function getPartyColor(party) {
  if (!party) return '#555';
  const p = party.toLowerCase();
  if (p.includes('dem')) return '#3b82f6';
  if (p.includes('rep')) return '#ef4444';
  return '#a855f7';
}

function getPartyShort(party) {
  if (!party) return '?';
  const p = party.toLowerCase();
  if (p.includes('dem')) return 'D';
  if (p.includes('rep')) return 'R';
  return 'I';
}

function formatScore(score) {
  return Math.round(score || 0);
}

// Assign a pseudo-score based on available data (real scoring engine coming)
function computeDisplayScore(member) {
  if (member.score && member.score > 0) return member.score;
  // Deterministic pseudo-score from bioguide_id until real scores arrive
  let hash = 0;
  const id = member.id || member.bioguide_id || member.name || '';
  for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) & 0xffffffff;
  return Math.abs(hash % 85) + 5;
}

// ── LOAD DATA ──
async function loadMembers() {
  try {
    const res = await fetch('data/members.json');
    if (!res.ok) throw new Error('No data file yet');
    const data = await res.json();
    allMembers = data.map(m => ({
      ...m,
      displayScore: computeDisplayScore(m),
      photo: getPhotoUrl(m.id || m.bioguide_id),
      partyColor: getPartyColor(m.party),
      partyShort: getPartyShort(m.party),
    }));
    updateStats();
    applyFilters();
  } catch(e) {
    // Fall back to demo data
    loadDemoData();
  }
}

function loadDemoData() {
  const demo = [
    { id:'P000197', name:'Nancy Pelosi',     party:'Democratic',  state:'CA', district:'11', chamber:'House',  score:94 },
    { id:'M000355', name:'Mitch McConnell',  party:'Republican',  state:'KY', district:'',   chamber:'Senate', score:91 },
    { id:'S000148', name:'Chuck Schumer',    party:'Democratic',  state:'NY', district:'',   chamber:'Senate', score:88 },
    { id:'F000062', name:'Dianne Feinstein', party:'Democratic',  state:'CA', district:'',   chamber:'Senate', score:85 },
    { id:'O000172', name:'Alexandria Ocasio-Cortez', party:'Democratic', state:'NY', district:'14', chamber:'House', score:81 },
    { id:'C001088', name:'Chris Coons',      party:'Democratic',  state:'DE', district:'',   chamber:'Senate', score:79 },
    { id:'G000386', name:'Chuck Grassley',   party:'Republican',  state:'IA', district:'',   chamber:'Senate', score:76 },
    { id:'R000595', name:'Marco Rubio',      party:'Republican',  state:'FL', district:'',   chamber:'Senate', score:74 },
    { id:'W000817', name:'Elizabeth Warren', party:'Democratic',  state:'MA', district:'',   chamber:'Senate', score:18 },
    { id:'S000033', name:'Bernie Sanders',   party:'Independent', state:'VT', district:'',   chamber:'Senate', score:12 },
  ];
  allMembers = demo.map(m => ({
    ...m,
    displayScore: m.score,
    photo: getPhotoUrl(m.id),
    partyColor: getPartyColor(m.party),
    partyShort: getPartyShort(m.party),
  }));
  updateStats();
  applyFilters();
}

function updateStats() {
  const high = allMembers.filter(m => m.displayScore >= 60).length;
  document.getElementById('stat-high').textContent = high;
  document.getElementById('stat-total').textContent = allMembers.length;
  document.getElementById('stat-trades').textContent = '—';
}

// ── FILTERS ──
function applyFilters() {
  filtered = allMembers.filter(m => {
    if (activeFilters.chamber !== 'all' && m.chamber !== activeFilters.chamber) return false;
    if (activeFilters.party !== 'all') {
      const p = (m.party || '').toLowerCase();
      const f = activeFilters.party.toLowerCase();
      if (!p.includes(f.slice(0,3))) return false;
    }
    if (activeFilters.search) {
      const q = activeFilters.search.toLowerCase();
      const name = (m.name || '').toLowerCase();
      const state = (m.state || '').toLowerCase();
      const dist = (m.district || '').toLowerCase();
      if (!name.includes(q) && !state.includes(q) && !dist.includes(q)) return false;
    }
    return true;
  });

  // Sort
  const [field, dir] = activeFilters.sort.split('-');
  filtered.sort((a, b) => {
    let va, vb;
    if (field === 'score') { va = a.displayScore; vb = b.displayScore; }
    else if (field === 'name') { va = a.name; vb = b.name; }
    else if (field === 'state') { va = a.state; vb = b.state; }
    else { va = a.displayScore; vb = b.displayScore; }

    if (typeof va === 'string') {
      return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return dir === 'asc' ? va - vb : vb - va;
  });

  document.getElementById('results-count').textContent = `${filtered.length} members`;
  renderGrid();
}

// ── RENDER ──
function renderGrid() {
  const container = document.getElementById('grid-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No members match your filters.</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'grid';

  filtered.forEach((m, i) => {
    const score = m.displayScore;
    const scoreClass = getScoreClass(score);
    const scoreColor = getScoreColor(score);
    const partyColor = m.partyColor;

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i * 20, 300)}ms`;
    card.onclick = () => openModal(m);

    const distStr = m.district ? `· ${m.state}-${m.district}` : `· ${m.state}`;

    card.innerHTML = `
      <div class="party-bar" style="background:${partyColor}"></div>
      <img class="card-photo" src="${m.photo}" alt="${m.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-photo-placeholder" style="display:none">${getInitials(m.name)}</div>
      <div class="card-overlay">
        <div class="card-name">${m.name}</div>
        <div class="card-meta">${m.partyShort} · ${m.chamber} ${distStr}</div>
        <div class="card-flags">
          ${score >= 60 ? '<span class="flag-tag" style="background:#3a0a0a;color:#ff6b6b">TRADE</span>' : ''}
          ${score >= 50 ? '<span class="flag-tag" style="background:#2a1a00;color:#ff9f0a">DONOR</span>' : ''}
          ${score >= 70 ? '<span class="flag-tag" style="background:#0a1a2a;color:#0a84ff">BILL</span>' : ''}
        </div>
      </div>
      <div class="card-score ${scoreClass}">${score}</div>
    `;

    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

// ── MODAL ──
function openModal(m) {
  const score = m.displayScore;
  const scoreColor = getScoreColor(score);
  const partyColor = m.partyColor;
  const distStr = m.district ? `${m.state}-${m.district}` : m.state;

  const flags = [];
  if (score >= 60) flags.push({ type: 'danger', text: `Stock trades flagged near related legislation. Pattern detected in trading activity.` });
  if (score >= 50) flags.push({ type: 'warn', text: `Voting record shows above-average alignment with top donor industries.` });
  if (score >= 70) flags.push({ type: 'info', text: `One or more sponsored bills share significant language with known model legislation.` });
  if (flags.length === 0) flags.push({ type: 'info', text: `No significant anomalies detected in available public records.` });

  const flagsHtml = flags.map(f => `
    <div class="flag-box ${f.type === 'warn' ? 'warn' : f.type === 'info' ? 'info' : ''}">
      <span class="flag-icon">${f.type === 'danger' ? '⚠' : f.type === 'warn' ? '⚠' : 'ℹ'}</span>
      <span class="flag-text">${f.text}</span>
    </div>
  `).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <img class="modal-photo" src="${m.photo}" alt="${m.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="modal-photo-placeholder" style="display:none">${getInitials(m.name)}</div>
      <div class="modal-info">
        <div class="modal-name">${m.name}</div>
        <div class="modal-detail">
          PARTY: ${m.party || '—'}<br>
          CHAMBER: ${m.chamber}<br>
          STATE: ${distStr}<br>
          ${m.years_in_office ? `YEARS IN OFFICE: ${m.years_in_office}<br>` : ''}
          ${m.role ? `ROLE: ${m.role}` : ''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="modal-score-big" style="color:${scoreColor}">${score}</div>
        <div class="modal-score-label">ANOMALY<br>SCORE</div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Key Figures</div>
      <div class="kv-row">
        <span class="kv-label">Est. Net Worth</span>
        <span class="kv-value ${score >= 70 ? 'hot' : ''}">${m.net_worth || '—'}</span>
      </div>
      <div class="kv-row">
        <span class="kv-label">Total Stock Trades</span>
        <span class="kv-value">${m.total_trades || '—'}</span>
      </div>
      <div class="kv-row">
        <span class="kv-label">Flagged Trades</span>
        <span class="kv-value ${score >= 60 ? 'hot' : ''}">${m.flagged_trades || '—'}</span>
      </div>
      <div class="kv-row">
        <span class="kv-label">Top Donors</span>
        <span class="kv-value">${m.top_donors || '—'}</span>
      </div>
      <div class="kv-row">
        <span class="kv-label">Donor Alignment</span>
        <span class="kv-value ${score >= 50 ? 'warm' : 'cool'}">${m.donor_alignment || '—'}</span>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Anomaly Flags</div>
      ${flagsHtml}
      <p style="font-size:9px;color:#444;margin-top:10px;line-height:1.6">
        DISCLAIMER: Anomaly score is a statistical indicator only. 
        Does not imply illegal activity or wrongdoing. 
        All data sourced from public government records.
      </p>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="shareModal('${m.name}', ${score})">Share</button>
      <button class="btn primary" onclick="alert('Full profile page coming soon')">Full Profile →</button>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function shareModal(name, score) {
  const text = `${name} has an anomaly score of ${score}/100 on CongressWatch. Check the data: congresswatch.vercel.app`;
  if (navigator.share) {
    navigator.share({ title: 'CongressWatch', text, url: 'https://congresswatch.vercel.app' });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
  }
}

// ── EVENT LISTENERS ──
document.querySelectorAll('[data-chamber]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-chamber]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilters.chamber = btn.dataset.chamber;
    applyFilters();
  });
});

document.querySelectorAll('[data-party]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-party]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilters.party = btn.dataset.party;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  activeFilters.search = e.target.value;
  applyFilters();
});

document.getElementById('sort-select').addEventListener('change', e => {
  activeFilters.sort = e.target.value;
  applyFilters();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// ── INIT ──
loadMembers();
</script>

</body>
</html>
